<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STEM Salary Regression – Michael Mesfin Tefera</title>
  <meta http-equiv="refresh" content="3;url=https://github.com/MMesfintefs/stem-salary-regression-analysis" />
  <style>
    :root {
      --bg1: #020302;
      --bg2: #07110b;
      --green: #2bd36f;
      --purple: #8a3dff;
      --ink: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Times New Roman", Times, serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 850px at 30% 40%, rgba(20,160,95,.32), transparent 60%),
        radial-gradient(900px 700px at 80% 30%, rgba(10,120,70,.22), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 55%, var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      max-width: 520px;
      padding: 48px 40px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      background: rgba(0,0,0,.30);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 400; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 16px; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--green), #1fa057);
      color: #fff;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(43,211,111,.30);
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(43,211,111,.45); }
    .note { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,.40); }
    .back { margin-top: 28px; display: block; color: var(--green); font-size: 14px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💰</div>
    <h1>STEM Salary Regression Analysis</h1>
    <p>A regression analysis examining compensation trends across STEM fields. You're being redirected to the GitHub repository.</p>
    <a class="btn" href="https://github.com/MMesfintefs/stem-salary-regression-analysis">View on GitHub →</a>
    <p class="note">Redirecting automatically in 3 seconds…</p>
    <a class="back" href="/portfolio/projects.html">← Back to Projects</a>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = "https://github.com/MMesfintefs/stem-salary-regression-analysis";
    }, 3000);
  </script>
</body>
</html>
